name: Publish signed Windows desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish Windows x64
    runs-on: windows-2025
    environment:
      name: windows-release
    env:
      PUBLIC_RELEASE_APPROVED_VERSION: ${{ vars.PUBLIC_RELEASE_APPROVED_VERSION }}
      PUBLIC_RELEASE_APPROVED_SHA: ${{ vars.PUBLIC_RELEASE_APPROVED_SHA }}

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: samloader-gui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.94.1
          components: clippy, rustfmt

      - name: Validate release ref and version surfaces
        id: release
        shell: pwsh
        run: |
          $tauriVersion = (Get-Content samloader-gui/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $packageVersion = (Get-Content samloader-gui/package.json | ConvertFrom-Json).version
          $packageLockVersion = (Get-Content samloader-gui/package-lock.json | ConvertFrom-Json -AsHashtable)["version"]
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read the locked Cargo workspace metadata."
          }
          $workspaceVersions = @($metadata.packages | Select-Object -ExpandProperty version -Unique)
          $versions = @($tauriVersion, $packageVersion, $packageLockVersion) + $workspaceVersions
          $mismatches = @($versions | Where-Object { $_ -ne $tauriVersion })
          if ($mismatches.Count -gt 0) {
            throw "Release version surfaces do not all match $tauriVersion."
          }
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne "v$tauriVersion") {
            throw "Tag $env:GITHUB_REF_NAME does not match desktop version v$tauriVersion."
          }
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and $env:GITHUB_REF -ne "refs/heads/main") {
            throw "Manual signed builds are restricted to the main branch."
          }
          "version=$tauriVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Require physical release approval for tags
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          if ($env:PUBLIC_RELEASE_APPROVED_VERSION -ne $version) {
            throw "Set PUBLIC_RELEASE_APPROVED_VERSION to $version only after completing RELEASE.md's physical-device matrix."
          }
          if ($env:PUBLIC_RELEASE_APPROVED_SHA -ne $env:GITHUB_SHA) {
            throw "Set PUBLIC_RELEASE_APPROVED_SHA to $env:GITHUB_SHA only after approving this exact tested commit."
          }

      - name: Refuse an existing GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repository = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          gh api "repos/$repository" --silent
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify access to $repository; refusing to publish."
          }
          $lookup = gh api "repos/$repository/releases/tags/$tag" 2>&1 | Out-String
          $lookupExit = $LASTEXITCODE
          if ($lookupExit -eq 0) {
            throw "GitHub release $tag already exists. Releases are immutable; create a new version and tag."
          }
          if ($lookup -notmatch '(?i)HTTP(?:/[0-9.]+)?\s+404|HTTP 404') {
            Write-Error $lookup
            throw "Could not prove that GitHub release $tag is absent; refusing to publish."
          }

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install pinned Rust dependency auditor
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Install frontend dependencies
        working-directory: samloader-gui
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test Rust (debug)
        run: cargo test --locked --workspace

      - name: Test Rust (release)
        run: cargo test --locked --release --workspace

      - name: Audit frontend dependencies
        working-directory: samloader-gui
        run: npm audit --audit-level=high

      - name: Test frontend safety helpers
        working-directory: samloader-gui
        run: npm test

      - name: Build frontend
        working-directory: samloader-gui
        run: npm run build

      - name: Audit Rust dependencies
        run: cargo audit --deny unsound --deny yanked --ignore RUSTSEC-2024-0429

      - name: Require signing credentials
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "Signed releases require WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets."
          }

      - name: Import signing certificate and configure Tauri
        id: certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificateDirectory = Join-Path $env:RUNNER_TEMP "samloader-certificate"
          New-Item -ItemType Directory -Path $certificateDirectory -Force | Out-Null
          $certificatePath = Join-Path $certificateDirectory "samloader.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $importedCertificates = Import-PfxCertificate `
            -FilePath $certificatePath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password
          $importedCertificates.Thumbprint |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Set-Content (Join-Path $certificateDirectory "imported-thumbprints.txt") -Encoding ascii
          $certificate = $importedCertificates |
            Where-Object {
              $_.HasPrivateKey -and
              ($_.EnhancedKeyUsageList.ObjectId -contains "1.3.6.1.5.5.7.3.3")
            } |
            Select-Object -First 1
          if (-not $certificate.Thumbprint) {
            throw "The Windows signing certificate could not be imported."
          }
          "thumbprint=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($certificate.NotAfter.ToUniversalTime() -le [DateTime]::UtcNow) {
            throw "The Windows signing certificate expired on $($certificate.NotAfter.ToString('u'))."
          }
          if ($certificate.NotBefore.ToUniversalTime() -gt [DateTime]::UtcNow) {
            throw "The Windows signing certificate is not valid until $($certificate.NotBefore.ToString('u'))."
          }
          $releaseConfig = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          }
          $releaseConfig | ConvertTo-Json -Depth 8 |
            Set-Content samloader-gui/src-tauri/tauri.release.conf.json -Encoding utf8

      - name: Build signed desktop bundles
        working-directory: samloader-gui
        run: npm.cmd run tauri -- build --config src-tauri/tauri.release.conf.json -- --locked

      - name: Rebuild clean standalone desktop executable
        shell: pwsh
        run: |
          $executable = [IO.Path]::GetFullPath((Join-Path $PWD "target/release/samloader-gui.exe"))
          $workspace = [IO.Path]::GetFullPath($PWD.Path).TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          if (-not $executable.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Standalone executable resolved outside the checked-out workspace."
          }
          if (Test-Path -LiteralPath $executable) {
            Remove-Item -LiteralPath $executable -Force
          }
          Push-Location samloader-gui
          npm.cmd run tauri -- build --no-bundle --no-sign -- --locked
          $buildExit = $LASTEXITCODE
          Pop-Location
          if ($buildExit -ne 0) {
            throw "Building the clean standalone desktop executable failed."
          }
          if (-not (Test-Path -LiteralPath $executable)) {
            throw "The clean standalone desktop executable was not produced."
          }

      - name: Build and sign standalone executables
        shell: pwsh
        run: |
          $workspace = [IO.Path]::GetFullPath($PWD.Path).TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          $desktopExecutable = [IO.Path]::GetFullPath((Join-Path $PWD "target/release/samloader-gui.exe"))
          $cliExecutable = [IO.Path]::GetFullPath((Join-Path $PWD "target/release/samloader.exe"))
          foreach ($path in @($desktopExecutable, $cliExecutable)) {
            if (-not $path.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Standalone executable resolved outside the checked-out workspace: $path"
            }
          }
          if (Test-Path -LiteralPath $cliExecutable) {
            Remove-Item -LiteralPath $cliExecutable -Force
          }
          cargo build --locked --release -p samloader
          if ($LASTEXITCODE -ne 0) {
            throw "Building the standalone command-line executable failed."
          }
          if (-not (Test-Path -LiteralPath $cliExecutable)) {
            throw "The standalone command-line executable was not produced."
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}/Windows Kits/10/bin/*/x64/signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }
          foreach ($executable in @(
            $desktopExecutable,
            $cliExecutable
          )) {
            & $signtool.FullName sign `
              /sha1 "${{ steps.certificate.outputs.thumbprint }}" `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              $executable
            if ($LASTEXITCODE -ne 0) {
              throw "Signing $executable failed."
            }
          }

      - name: Stage and verify release artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $workspace = [IO.Path]::GetFullPath($PWD.Path).TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          $staging = [IO.Path]::GetFullPath((Join-Path $PWD "release-staging"))
          if (-not $staging.StartsWith($workspace, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Release staging resolved outside the checked-out workspace."
          }
          if (Test-Path -LiteralPath $staging) {
            Remove-Item -LiteralPath $staging -Recurse -Force
          }
          New-Item -ItemType Directory -Path $staging | Out-Null
          $portable = Join-Path $staging "samloader_${version}_x64-portable.exe"
          $cli = Join-Path $staging "samloader_${version}_windows_x64-cli.exe"
          $installerSource = Join-Path $PWD "target/release/bundle/nsis/samloader_${version}_x64-setup.exe"
          $installer = Join-Path $staging "samloader_${version}_x64-setup.exe"
          Copy-Item target/release/samloader-gui.exe $portable
          Copy-Item target/release/samloader.exe $cli
          Copy-Item $installerSource $installer
          Copy-Item LICENSE,LICENSE-MIT,THIRD_PARTY_NOTICES.md $staging
          Copy-Item samloader-gui/public/licenses/DEPENDENCY_LICENSES.md $staging
          Copy-Item samloader-gui/public/licenses/OFL-1.1.txt $staging
          $expectedThumbprint = "${{ steps.certificate.outputs.thumbprint }}"
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}/Windows Kits/10/bin/*/x64/signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }
          foreach ($artifact in @($portable, $installer, $cli)) {
            $signature = Get-AuthenticodeSignature $artifact
            if ($signature.Status -ne "Valid") {
              throw "Authenticode verification failed for $artifact ($($signature.Status))."
            }
            if ($signature.SignerCertificate.Thumbprint -ne $expectedThumbprint) {
              throw "Unexpected Authenticode signer for $artifact."
            }
            if (-not $signature.TimeStamperCertificate) {
              throw "The Authenticode signature for $artifact is not timestamped."
            }
            & $signtool.FullName verify /pa /all /v $artifact
            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed for $artifact."
            }
          }
          $hashLines = Get-FileHash $portable,$installer,$cli -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" }
          $hashLines | Set-Content (Join-Path $staging "SHA256SUMS.txt") -Encoding ascii
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Remove signing material after verification
        shell: pwsh
        run: |
          $certificateDirectory = Join-Path $env:RUNNER_TEMP "samloader-certificate"
          $thumbprintFile = Join-Path $certificateDirectory "imported-thumbprints.txt"
          if (Test-Path -LiteralPath $thumbprintFile) {
            foreach ($thumbprint in Get-Content -LiteralPath $thumbprintFile) {
              if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
                $certificatePath = "Cert:\CurrentUser\My\$thumbprint"
                if (Test-Path -LiteralPath $certificatePath) {
                  Remove-Item -LiteralPath $certificatePath -Force -ErrorAction Stop
                }
                if (Test-Path -LiteralPath $certificatePath) {
                  throw "Signing certificate $thumbprint remains installed after cleanup."
                }
              }
            }
          }
          if (Test-Path -LiteralPath $certificateDirectory) {
            Remove-Item -LiteralPath $certificateDirectory -Recurse -Force -ErrorAction Stop
          }
          if (Test-Path -LiteralPath $certificateDirectory) {
            throw "Signing PFX material remains on disk after cleanup."
          }

      - name: Generate software bill of materials
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release-staging/samloader_${{ steps.artifacts.outputs.version }}_sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Enforce exact release artifact allowlist
        shell: pwsh
        run: |
          $version = "${{ steps.artifacts.outputs.version }}"
          $expected = @(
            "DEPENDENCY_LICENSES.md",
            "LICENSE",
            "LICENSE-MIT",
            "OFL-1.1.txt",
            "SHA256SUMS.txt",
            "THIRD_PARTY_NOTICES.md",
            "samloader_${version}_sbom.cdx.json",
            "samloader_${version}_windows_x64-cli.exe",
            "samloader_${version}_x64-portable.exe",
            "samloader_${version}_x64-setup.exe"
          ) | Sort-Object
          $actual = @(Get-ChildItem release-staging -File | Select-Object -ExpandProperty Name | Sort-Object)
          $difference = Compare-Object -ReferenceObject $expected -DifferenceObject $actual
          if ($difference) {
            $difference | Format-Table | Out-String | Write-Error
            throw "Release staging contains missing or unexpected artifacts."
          }

      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-staging/*

      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: samloader-${{ steps.artifacts.outputs.version }}-windows-x64-signed
          path: release-staging/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem release-staging -File | ForEach-Object FullName
          gh release create $tag @assets `
            --verify-tag `
            --draft `
            --title "samloader $tag" `
            --notes-file CHANGELOG.md
          if ($LASTEXITCODE -ne 0) {
            throw "Creating the draft GitHub release $tag failed. Existing releases are never overwritten."
          }
          gh release edit $tag --draft=false
          if ($LASTEXITCODE -ne 0) {
            throw "All assets uploaded, but GitHub release $tag could not be published. It remains a private draft for maintainer review."
          }

      - name: Remove signing material
        if: always()
        shell: pwsh
        run: |
          $certificateDirectory = Join-Path $env:RUNNER_TEMP "samloader-certificate"
          $thumbprintFile = Join-Path $certificateDirectory "imported-thumbprints.txt"
          if (Test-Path -LiteralPath $thumbprintFile) {
            foreach ($thumbprint in Get-Content -LiteralPath $thumbprintFile) {
              if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
                Remove-Item -LiteralPath "Cert:\CurrentUser\My\$thumbprint" -Force -ErrorAction SilentlyContinue
              }
            }
          }
          if (Test-Path -LiteralPath $certificateDirectory) {
            Remove-Item -LiteralPath $certificateDirectory -Recurse -Force -ErrorAction SilentlyContinue
          }
